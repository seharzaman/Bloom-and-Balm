<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Bloom &amp; Balm</title>
  <meta name="description" content="Get in touch with Bloom &amp; Balm — product suggestions, questions, or hello.">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script src="site.js"></script>
  <script src="components.js"></script>
</head>
<body class="page-wrap">
  <div id="nav-mount"></div>
  <main>
    <section style="padding:5rem 0">
      <div class="container--narrow">
        <span style="font-size:.7rem;text-transform:uppercase;letter-spacing:.25em;color:var(--rose);">Say hello</span>
        <h1 style="font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);margin-top:.75rem;margin-bottom:1rem;">Get in touch</h1>
        <p style="color:var(--muted);margin-bottom:2.5rem;">Product suggestions, questions, or just want to share what's working for your skin? I read every message.</p>

        <div id="form-wrap">
          <form class="contact-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="6" required placeholder="What's on your mind?"></textarea>
            </div>
            <div>
              <button type="submit" class="btn btn--primary">Send message</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-mount"></div>
  <script>
    document.getElementById('nav-mount').innerHTML = renderNav();
    document.getElementById('footer-mount').innerHTML = renderFooter();
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('form-wrap').innerHTML = `
        <div class="form-success">
          <h3>Thanks — message received.</h3>
          <p>I'll get back to you within a few days.</p>
        </div>`;
    }
  </script>
</body>
</html>
